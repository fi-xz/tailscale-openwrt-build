name: Build Tailscale for OpenWRT

on:
  schedule:
    - cron: '0 4 * * 1'   # weekly Monday 4 AM UTC
  workflow_dispatch:
    inputs:
      tailscale_version:
        description: 'Tailscale version (or "latest")'
        default: 'latest'

permissions:
  contents: write

jobs:
  # ── Resolve version & build matrix ────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}
      matrix: ${{ steps.matrix.outputs.architectures }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Override version from workflow input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tailscale_version != ''
        run: |
          sed -i "s/^TAILSCALE_VERSION=.*/TAILSCALE_VERSION=\"${{ github.event.inputs.tailscale_version }}\"/" build.conf

      - name: Resolve Tailscale version
        id: version
        run: |
          source build.conf
          if [ "$TAILSCALE_VERSION" = "latest" ]; then
            TAILSCALE_VERSION="$(curl -fsSL https://api.github.com/repos/tailscale/tailscale/releases/latest | jq -r .tag_name)"
          fi
          echo "version=$TAILSCALE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAILSCALE_VERSION"

      - name: Check if already released
        id: check
        run: |
          TAG="build-${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate matrix from build.conf
        id: matrix
        run: |
          source build.conf
          # Build JSON array from ARCHITECTURES, e.g. ["mipsle:softfloat","arm:7"]
          json="$(printf '%s\n' "${ARCHITECTURES[@]}" | jq -R . | jq -sc .)"
          echo "architectures=$json" >> "$GITHUB_OUTPUT"
          echo "Matrix: $json"

  # ── Per-architecture build ────────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Override version from workflow input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tailscale_version != ''
        run: |
          sed -i "s/^TAILSCALE_VERSION=.*/TAILSCALE_VERSION=\"${{ github.event.inputs.tailscale_version }}\"/" build.conf

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: |
            tailscale.combined.*

  # ── Collect artifacts, release, deploy feed ───────────────────
  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          TAG="build-${{ needs.prepare.outputs.version }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Tailscale ${{ needs.prepare.outputs.version }}" \
            --notes "Automated multi-arch build of Tailscale ${{ needs.prepare.outputs.version }} for OpenWRT.

          Architectures: $(echo '${{ needs.prepare.outputs.matrix }}' | jq -r 'join(", ")')

          Download the appropriate binary for your architecture and deploy it to your OpenWRT device." \
            tailscale.combined.*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
