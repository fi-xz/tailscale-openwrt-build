# build.conf — Tailscale cross-compile configuration for OpenWRT
# Edit ARCHITECTURES, OMIT_TAGS, INCLUDE_TAGS to control the build.

# "latest" auto-detects from GitHub API; or pin e.g. "v1.78.1"
TAILSCALE_VERSION="latest"

# ── Target architectures ────────────────────────────────────────
# Format:  GOARCH:VARIANT
#   VARIANT maps to GOMIPS (mips/mipsle), GOARM (arm), or ignored (arm64/amd64).
#   The opkg arch string is derived automatically, e.g. mipsle_softfloat, arm_7.
#
# Uncomment / add lines to build for more targets.
ARCHITECTURES=(
  mipsle:softfloat
  # mips:softfloat
  # arm:7
  # arm:6
  # arm64:
  # amd64:
)

# ── Feature tags ────────────────────────────────────────────────
# Tags listed here become -tags "ts_omit_<tag>,..." at build time.
# Comment out a line to RE-ENABLE that feature.
OMIT_TAGS=(
  ssh
  serve
  drive
  taildrop
  kube
  aws
  bird
  synology
  doctor
  debug
  debugeventbus
  debugportmapper
  tpm
  posture
  systray
  qrcodes
  webclient
  tap
  relayserver
  wakeonlan
  colorable
  completion
  completion_scripts
  capture
  desktop_sessions
  identityfederation
  oauthkey
  outboundproxy
  acme
  ace
  conn25
  cloud
  netlog
  hujsonconf
  linkspeed
  networkmanager
  resolved
  sdnotify
  webbrowser
  usermetrics
  clientmetrics
  clientupdate
  appconnectors
  tailnetlock
  bakedroots
  peerapiclient
  peerapiserver
  cachenetmap
  lazywg
  linuxdnsfight
  listenrawdisco
  syspolicy
  unixsocketidentity
  useproxy
  gro
  portlist
  dbus
)

# Extra build tags (always included)
INCLUDE_TAGS=(
  ts_include_cli
)

# UPX compression (requires upx in PATH; not supported on all arches e.g. mips64)
UPX_ENABLED="true"
